<!DOCTYPE html>
<html>
<head>
    <title>SpendWise App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SpendWise Tracker 💰</h1>

    <div class="container">
        <input type="text" id="item" placeholder="Expense name">
        <input type="number" id="cost" placeholder="Amount (₱)">
        <button onclick="addItem()">Add Expense</button>

        <ul id="expenses"></ul>

        <h3>Total Spending: ₱<span id="total">0</span></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
